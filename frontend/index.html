<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTCUSDT 호가창</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 사용자가 사이트 URL에 접속하면 Vite가 기본 문서인 index.html을 응답하고,
         브라우저는 아래 script 태그를 읽어 main.tsx를 다시 요청하면서 React 앱이 시작된다. -->
    <!-- script 태그: HTML 문서에서 JavaScript 파일을 불러와 실행한다. -->
    <!-- type="module": 이 파일을 ES 모듈 방식으로 실행하며 import/export 문법을 사용할 수 있다.
         또한 일반 script와 달리 module script는 기본적으로 defer처럼 동작하여 HTML을 끝까지 읽은 뒤 실행된다. -->
    <!-- src: React 앱의 실행이 시작되는 진입 파일(main.tsx)의 경로를 지정한다. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
<!-- Vite 개발 서버로부터 index.html 데이터 청크 도착
     → HTML 파싱 작업이 태스크 큐에 준비됨
     → 이벤트 루프 구현 코드가 실행 가능한 태스크 확인
     → HTML 파싱 태스크 선택
     → 렌더러 메인 스레드가 Blink의 HTML 파서 실행
     → DOM 생성 및 main.tsx 모듈 요청

     HTML 문서 전체가 항상 하나의 태스크로 처리되는 것은 아니다.
     HTML 데이터가 여러 청크로 도착하면 각 청크를 처리하기 위한 파서 작업이 여러 차례 이어질 수 있다. -->
