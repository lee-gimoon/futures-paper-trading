<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">

  <defs>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Title bar -->
  <rect x="0" y="0" width="1000" height="42" fill="#0f766e"/>
  <text x="500" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="white">
    Phase 0 step 7 — 8080 포트 listen + 이벤트 루프 풀
  </text>

  <!-- Layer 1: External clients -->
  <text x="20" y="68" font-size="12" fill="#475569">외부 클라이언트 (수십~수천 개 동시 연결 가능):</text>
  <g>
    <rect x="110" y="78" width="80" height="28" fill="#cbd5e1" rx="14"/>
    <text x="150" y="97" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">Postman</text>
    <rect x="250" y="78" width="80" height="28" fill="#cbd5e1" rx="14"/>
    <text x="290" y="97" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">Chrome</text>
    <rect x="390" y="78" width="80" height="28" fill="#cbd5e1" rx="14"/>
    <text x="430" y="97" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">curl</text>
    <rect x="530" y="78" width="80" height="28" fill="#cbd5e1" rx="14"/>
    <text x="570" y="97" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">Firefox</text>
    <rect x="670" y="78" width="80" height="28" fill="#cbd5e1" rx="14"/>
    <text x="710" y="97" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">k6</text>
    <circle cx="850" cy="92" r="14" fill="#cbd5e1"/>
    <text x="850" y="97" text-anchor="middle" font-size="13" fill="#475569" font-weight="600">...</text>
  </g>

  <!-- Arrows to port -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="3,2">
    <line x1="150" y1="108" x2="420" y2="148" marker-end="url(#arr-gray)"/>
    <line x1="290" y1="108" x2="460" y2="148" marker-end="url(#arr-gray)"/>
    <line x1="430" y1="108" x2="490" y2="148" marker-end="url(#arr-gray)"/>
    <line x1="570" y1="108" x2="520" y2="148" marker-end="url(#arr-gray)"/>
    <line x1="710" y1="108" x2="550" y2="148" marker-end="url(#arr-gray)"/>
    <line x1="850" y1="108" x2="580" y2="148" marker-end="url(#arr-gray)"/>
  </g>

  <!-- Layer 2: Port 8080 -->
  <rect x="350" y="152" width="300" height="62" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <text x="500" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">OS 포트 8080 (listening socket)</text>
  <text x="500" y="198" text-anchor="middle" font-size="10" fill="#92400e">"이 포트로 오는 TCP 연결을 우리가 받겠다"고 OS에 등록</text>

  <!-- Arrow + accept() label -->
  <line x1="500" y1="218" x2="500" y2="258" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="513" y="243" font-size="10" fill="#64748b">accept() — 큐에서 새 연결 꺼냄</text>

  <!-- Layer 3: Distribution -->
  <rect x="280" y="263" width="440" height="50" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="500" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">분배 — 새 연결을 가용 이벤트 루프에 할당</text>
  <text x="500" y="302" text-anchor="middle" font-size="10" fill="#1e40af">(라운드 로빈 등으로 골고루)</text>

  <!-- Distribution arrows -->
  <g stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2" fill="none">
    <line x1="370" y1="313" x2="140" y2="368" marker-end="url(#arr-blue)"/>
    <line x1="440" y1="313" x2="365" y2="368" marker-end="url(#arr-blue)"/>
    <line x1="560" y1="313" x2="590" y2="368" marker-end="url(#arr-blue)"/>
    <line x1="630" y1="313" x2="815" y2="368" marker-end="url(#arr-blue)"/>
  </g>

  <!-- Layer 4: Event loops -->
  <!-- EventLoop 1 -->
  <rect x="40" y="372" width="200" height="316" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2" rx="6"/>
  <text x="140" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">EventLoop 1</text>
  <text x="140" y="407" text-anchor="middle" font-size="9" fill="#64748b">= OS Thread "reactor-http-nio-1"</text>
  <rect x="55" y="418" width="170" height="170" fill="white" stroke="#5eead4" rx="3"/>
  <text x="140" y="434" text-anchor="middle" font-size="10" font-weight="700" fill="#0f766e">Selector</text>
  <text x="140" y="448" text-anchor="middle" font-size="9" fill="#64748b">감시 중인 연결들:</text>
  <g font-size="9" fill="#334155">
    <circle cx="68" cy="468" r="3" fill="#0f766e"/><text x="78" y="471">Postman → POST /start</text>
    <circle cx="68" cy="486" r="3" fill="#0f766e"/><text x="78" y="489">Binance WS (outbound)</text>
    <circle cx="68" cy="504" r="3" fill="#0f766e"/><text x="78" y="507">curl → GET /health</text>
    <text x="78" y="528" fill="#94a3b8">... 수십~수백 개</text>
  </g>
  <rect x="55" y="600" width="170" height="78" fill="#f0fdfa" stroke="#5eead4" rx="3"/>
  <text x="140" y="616" text-anchor="middle" font-size="9" font-weight="700" fill="#0f766e">while (true) {</text>
  <text x="62" y="632" font-size="9" fill="#334155">  selector.select()</text>
  <text x="62" y="646" font-size="9" fill="#64748b">  // 이벤트 있는 conn 깨움</text>
  <text x="62" y="660" font-size="9" fill="#334155">  처리 → 다음으로</text>
  <text x="140" y="675" text-anchor="middle" font-size="9" font-weight="700" fill="#0f766e">}</text>

  <!-- EventLoop 2 -->
  <rect x="265" y="372" width="200" height="316" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2" rx="6"/>
  <text x="365" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">EventLoop 2</text>
  <text x="365" y="407" text-anchor="middle" font-size="9" fill="#64748b">= OS Thread "reactor-http-nio-2"</text>
  <rect x="280" y="418" width="170" height="170" fill="white" stroke="#5eead4" rx="3"/>
  <text x="365" y="434" text-anchor="middle" font-size="10" font-weight="700" fill="#0f766e">Selector</text>
  <text x="365" y="448" text-anchor="middle" font-size="9" fill="#64748b">감시 중인 연결들:</text>
  <g font-size="9" fill="#334155">
    <circle cx="293" cy="468" r="3" fill="#0f766e"/><text x="303" y="471">Chrome → GET /price</text>
    <circle cx="293" cy="486" r="3" fill="#0f766e"/><text x="303" y="489">k6 → POST /api/test</text>
    <text x="303" y="510" fill="#94a3b8">...</text>
  </g>
  <rect x="280" y="600" width="170" height="78" fill="#f0fdfa" stroke="#5eead4" rx="3"/>
  <text x="365" y="616" text-anchor="middle" font-size="9" font-weight="700" fill="#0f766e">while (true) {</text>
  <text x="287" y="632" font-size="9" fill="#334155">  selector.select()</text>
  <text x="287" y="646" font-size="9" fill="#64748b">  // 이벤트 있는 conn</text>
  <text x="287" y="660" font-size="9" fill="#334155">  처리 → 다음으로</text>
  <text x="365" y="675" text-anchor="middle" font-size="9" font-weight="700" fill="#0f766e">}</text>

  <!-- EventLoop 3 -->
  <rect x="490" y="372" width="200" height="316" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2" rx="6"/>
  <text x="590" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">EventLoop 3</text>
  <text x="590" y="407" text-anchor="middle" font-size="9" fill="#64748b">= OS Thread "reactor-http-nio-3"</text>
  <rect x="505" y="418" width="170" height="170" fill="white" stroke="#5eead4" rx="3"/>
  <text x="590" y="434" text-anchor="middle" font-size="10" font-weight="700" fill="#0f766e">Selector</text>
  <text x="590" y="448" text-anchor="middle" font-size="9" fill="#64748b">감시 중인 연결들:</text>
  <g font-size="9" fill="#334155">
    <circle cx="518" cy="468" r="3" fill="#0f766e"/><text x="528" y="471">Firefox → GET /</text>
    <circle cx="518" cy="486" r="3" fill="#0f766e"/><text x="528" y="489">OrderService → /hook</text>
    <text x="528" y="510" fill="#94a3b8">...</text>
  </g>
  <rect x="505" y="600" width="170" height="78" fill="#f0fdfa" stroke="#5eead4" rx="3"/>
  <text x="590" y="616" text-anchor="middle" font-size="9" font-weight="700" fill="#0f766e">while (true) {</text>
  <text x="512" y="632" font-size="9" fill="#334155">  selector.select()</text>
  <text x="512" y="646" font-size="9" fill="#64748b">  // 이벤트 있는 conn</text>
  <text x="512" y="660" font-size="9" fill="#334155">  처리 → 다음으로</text>
  <text x="590" y="675" text-anchor="middle" font-size="9" font-weight="700" fill="#0f766e">}</text>

  <!-- EventLoop N -->
  <rect x="715" y="372" width="200" height="316" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2" rx="6"/>
  <text x="815" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">EventLoop N</text>
  <text x="815" y="407" text-anchor="middle" font-size="9" fill="#64748b">N = CPU 코어 수 (보통 8개)</text>
  <rect x="730" y="418" width="170" height="170" fill="white" stroke="#5eead4" rx="3"/>
  <text x="815" y="434" text-anchor="middle" font-size="10" font-weight="700" fill="#0f766e">Selector</text>
  <text x="815" y="448" text-anchor="middle" font-size="9" fill="#64748b">감시 중인 연결들:</text>
  <g font-size="9" fill="#334155">
    <circle cx="743" cy="468" r="3" fill="#0f766e"/><text x="753" y="471">Chrome → /assets/x.js</text>
    <circle cx="743" cy="486" r="3" fill="#0f766e"/><text x="753" y="489">Prometheus → /metrics</text>
    <text x="753" y="510" fill="#94a3b8">...</text>
  </g>
  <rect x="730" y="600" width="170" height="78" fill="#f0fdfa" stroke="#5eead4" rx="3"/>
  <text x="815" y="616" text-anchor="middle" font-size="9" font-weight="700" fill="#0f766e">while (true) {</text>
  <text x="737" y="632" font-size="9" fill="#334155">  selector.select()</text>
  <text x="737" y="646" font-size="9" fill="#64748b">  // 이벤트 있는 conn</text>
  <text x="737" y="660" font-size="9" fill="#334155">  처리 → 다음으로</text>
  <text x="815" y="675" text-anchor="middle" font-size="9" font-weight="700" fill="#0f766e">}</text>

  <!-- Bottom annotation -->
  <text x="500" y="710" text-anchor="middle" font-size="11" font-weight="700" fill="#0f766e">
    → N개의 이벤트 루프 스레드가 수백~수천 개의 연결을 다중 처리 (스레드 = 코어 수만 사용)
  </text>
</svg>
