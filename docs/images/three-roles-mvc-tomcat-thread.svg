  <text x="600" y="878" text-anchor="middle" font-size="13" fill="#334155">
    OS가 <tspan font-weight="700" fill="#ea580c">자식 스레드 200개</tspan>를 만들어줌 → 요청 1개는 그중 요청 처리용 자식 스레드 하나가 Tomcat + Spring MVC + 너의 코드까지 끝까지 처리.
  </text>

