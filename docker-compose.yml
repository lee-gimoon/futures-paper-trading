name: futures-paper-trading

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: futures_paper_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d futures_paper_trading"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/futures_paper_trading
      SPRING_R2DBC_USERNAME: postgres
      SPRING_R2DBC_PASSWORD: postgres
      SPRING_SQL_INIT_MODE: always
      JAVA_OPTS: -XX:MaxRAMPercentage=75.0
    ports:
      - "8080:8080"

volumes:
  postgres-data:
