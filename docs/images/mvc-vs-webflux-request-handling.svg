<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 880" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">

  <defs>
    <pattern id="blocked" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#fef2f2"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#fca5a5" stroke-width="2"/>
    </pattern>
    <pattern id="iowait" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#f0fdfa"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#5eead4" stroke-width="2"/>
    </pattern>
  </defs>

  <!-- ===== MVC SECTION ===== -->

  <rect x="0" y="0" width="1000" height="48" fill="#7f1d1d"/>
  <text x="20" y="30" font-size="18" font-weight="700" fill="white">Spring MVC — 요청 1개당 스레드 1개를 끝까지 점유</text>

  <text x="20" y="78" font-size="13" fill="#475569">동시에 도착한 5개 요청:</text>
  <g font-size="12" font-weight="700" fill="white">
    <circle cx="200" cy="74" r="11" fill="#ef4444"/><text x="200" y="78" text-anchor="middle">1</text>
    <circle cx="230" cy="74" r="11" fill="#f59e0b"/><text x="230" y="78" text-anchor="middle">2</text>
    <circle cx="260" cy="74" r="11" fill="#10b981"/><text x="260" y="78" text-anchor="middle">3</text>
    <circle cx="290" cy="74" r="11" fill="#3b82f6"/><text x="290" y="78" text-anchor="middle">4</text>
    <circle cx="320" cy="74" r="11" fill="#8b5cf6"/><text x="320" y="78" text-anchor="middle">5</text>
  </g>

  <text x="120" y="105" font-size="11" fill="#64748b">시간 →</text>
  <line x1="120" y1="110" x2="840" y2="110" stroke="#cbd5e1" stroke-width="1"/>

  <g font-size="12" fill="#334155">
    <!-- Thread 1: R1, blocked 14 units -->
    <text x="115" y="139" text-anchor="end">Thread 1</text>
    <rect x="120" y="121" width="36" height="28" fill="#ef4444" rx="2"/>
    <rect x="156" y="121" width="252" height="28" fill="url(#blocked)" stroke="#fca5a5" stroke-width="1"/>
    <rect x="408" y="121" width="36" height="28" fill="#ef4444" rx="2" opacity="0.65"/>
    <text x="282" y="139" text-anchor="middle" font-size="11" fill="#7f1d1d" font-weight="700">BLOCKED — DB 응답 대기</text>

    <!-- Thread 2: R2, blocked 6 units -->
    <text x="115" y="177" text-anchor="end">Thread 2</text>
    <rect x="120" y="159" width="36" height="28" fill="#f59e0b" rx="2"/>
    <rect x="156" y="159" width="108" height="28" fill="url(#blocked)" stroke="#fca5a5" stroke-width="1"/>
    <rect x="264" y="159" width="36" height="28" fill="#f59e0b" rx="2" opacity="0.65"/>
    <text x="210" y="177" text-anchor="middle" font-size="11" fill="#7f1d1d" font-weight="700">BLOCKED</text>

    <!-- Thread 3: R3, blocked 16 units -->
    <text x="115" y="215" text-anchor="end">Thread 3</text>
    <rect x="120" y="197" width="36" height="28" fill="#10b981" rx="2"/>
    <rect x="156" y="197" width="288" height="28" fill="url(#blocked)" stroke="#fca5a5" stroke-width="1"/>
    <rect x="444" y="197" width="36" height="28" fill="#10b981" rx="2" opacity="0.65"/>
    <text x="300" y="215" text-anchor="middle" font-size="11" fill="#7f1d1d" font-weight="700">BLOCKED — DB 응답 대기</text>

    <!-- Thread 4: R4, blocked 26 units -->
    <text x="115" y="253" text-anchor="end">Thread 4</text>
    <rect x="120" y="235" width="36" height="28" fill="#3b82f6" rx="2"/>
    <rect x="156" y="235" width="468" height="28" fill="url(#blocked)" stroke="#fca5a5" stroke-width="1"/>
    <rect x="624" y="235" width="36" height="28" fill="#3b82f6" rx="2" opacity="0.65"/>
    <text x="390" y="253" text-anchor="middle" font-size="11" fill="#7f1d1d" font-weight="700">BLOCKED — 외부 API 응답 대기</text>

    <!-- Thread 5: R5, blocked 30 units -->
    <text x="115" y="291" text-anchor="end">Thread 5</text>
    <rect x="120" y="273" width="36" height="28" fill="#8b5cf6" rx="2"/>
    <rect x="156" y="273" width="540" height="28" fill="url(#blocked)" stroke="#fca5a5" stroke-width="1"/>
    <rect x="696" y="273" width="36" height="28" fill="#8b5cf6" rx="2" opacity="0.65"/>
    <text x="426" y="291" text-anchor="middle" font-size="11" fill="#7f1d1d" font-weight="700">BLOCKED — 외부 API 응답 대기</text>
  </g>

  <!-- Legend for MVC -->
  <g transform="translate(120, 320)" font-size="11" fill="#475569">
    <rect x="0" y="0" width="14" height="14" fill="#ef4444"/>
    <text x="20" y="11">request 받음</text>
    <rect x="120" y="0" width="14" height="14" fill="url(#blocked)" stroke="#fca5a5"/>
    <text x="140" y="11">스레드 BLOCKED — 다른 일 못 함, 그냥 점유</text>
    <rect x="400" y="0" width="14" height="14" fill="#ef4444" opacity="0.65"/>
    <text x="420" y="11">응답</text>
  </g>

  <text x="500" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">
    → 5 요청 = 5 스레드가 거의 모든 시간을 "기다리며" 점유. 100 요청이면 100 스레드가 마비.
  </text>

  <line x1="0" y1="395" x2="1000" y2="395" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ===== WEBFLUX SECTION ===== -->

  <rect x="0" y="415" width="1000" height="48" fill="#0f766e"/>
  <text x="20" y="445" font-size="18" font-weight="700" fill="white">Spring WebFlux — 적은 스레드가 모든 요청을 돌려가며 처리</text>

  <text x="20" y="493" font-size="13" fill="#475569">동시에 도착한 5개 요청 (위와 동일):</text>
  <g font-size="12" font-weight="700" fill="white">
    <circle cx="240" cy="489" r="11" fill="#ef4444"/><text x="240" y="493" text-anchor="middle">1</text>
    <circle cx="270" cy="489" r="11" fill="#f59e0b"/><text x="270" y="493" text-anchor="middle">2</text>
    <circle cx="300" cy="489" r="11" fill="#10b981"/><text x="300" y="493" text-anchor="middle">3</text>
    <circle cx="330" cy="489" r="11" fill="#3b82f6"/><text x="330" y="493" text-anchor="middle">4</text>
    <circle cx="360" cy="489" r="11" fill="#8b5cf6"/><text x="360" y="493" text-anchor="middle">5</text>
  </g>

  <text x="120" y="520" font-size="11" fill="#64748b">시간 →</text>
  <line x1="120" y1="525" x2="840" y2="525" stroke="#cbd5e1" stroke-width="1"/>

  <g font-size="12" fill="#334155">
    <!-- Event Loop 1: handles R1, R2, R3 -->
    <text x="115" y="548" text-anchor="end">Event Loop 1</text>
    <text x="115" y="562" text-anchor="end" font-size="9" fill="#64748b">(= OS 스레드 1개)</text>
    <rect x="120" y="536" width="36" height="28" fill="#ef4444" rx="2"/>
    <rect x="156" y="536" width="36" height="28" fill="#f59e0b" rx="2"/>
    <rect x="192" y="536" width="36" height="28" fill="#10b981" rx="2"/>
    <rect x="264" y="536" width="36" height="28" fill="#f59e0b" rx="2" opacity="0.65"/>
    <rect x="408" y="536" width="36" height="28" fill="#ef4444" rx="2" opacity="0.65"/>
    <rect x="444" y="536" width="36" height="28" fill="#10b981" rx="2" opacity="0.65"/>

    <!-- Event Loop 2: handles R4, R5 -->
    <text x="115" y="586" text-anchor="end">Event Loop 2</text>
    <text x="115" y="600" text-anchor="end" font-size="9" fill="#64748b">(= OS 스레드 1개)</text>
    <rect x="120" y="574" width="36" height="28" fill="#3b82f6" rx="2"/>
    <rect x="156" y="574" width="36" height="28" fill="#8b5cf6" rx="2"/>
    <rect x="624" y="574" width="36" height="28" fill="#3b82f6" rx="2" opacity="0.65"/>
    <rect x="696" y="574" width="36" height="28" fill="#8b5cf6" rx="2" opacity="0.65"/>
  </g>

  <!-- Connection arrows: receive → I/O zone (subtle dotted lines) -->
  <g stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2" fill="none">
    <line x1="156" y1="564" x2="156" y2="666"/>
    <line x1="192" y1="564" x2="192" y2="682"/>
    <line x1="228" y1="564" x2="228" y2="698"/>
    <line x1="156" y1="602" x2="156" y2="714"/>
    <line x1="192" y1="602" x2="192" y2="730"/>
  </g>

  <text x="120" y="635" font-size="12" font-weight="700" fill="#0f766e">↓ 대기는 스레드 밖에서 발생 (OS / 외부 시스템이 알아서 함)</text>

  <rect x="120" y="645" width="720" height="115" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5" rx="4"/>
  <text x="128" y="660" font-size="10" fill="#0f766e" font-weight="600">OS Kernel — 각 줄무늬 = 한 요청이 기다리는 I/O 작업 (DB 쿼리 / API 호출 등)</text>

  <g font-size="10" fill="#475569">
    <text x="148" y="680" text-anchor="end">R1</text>
    <rect x="156" y="671" width="252" height="14" fill="url(#iowait)" stroke="#5eead4"/>
    <text x="416" y="682" font-size="10" fill="#0f766e" font-weight="600">DB 쿼리 응답 대기 중</text>

    <text x="148" y="696" text-anchor="end">R2</text>
    <rect x="192" y="687" width="72" height="14" fill="url(#iowait)" stroke="#5eead4"/>
    <text x="272" y="698" font-size="10" fill="#0f766e" font-weight="600">DB 쿼리 응답 대기 중</text>

    <text x="148" y="712" text-anchor="end">R3</text>
    <rect x="228" y="703" width="216" height="14" fill="url(#iowait)" stroke="#5eead4"/>
    <text x="452" y="714" font-size="10" fill="#0f766e" font-weight="600">DB 쿼리 응답 대기 중</text>

    <text x="148" y="728" text-anchor="end">R4</text>
    <rect x="156" y="719" width="468" height="14" fill="url(#iowait)" stroke="#5eead4"/>
    <text x="632" y="730" font-size="10" fill="#0f766e" font-weight="600">외부 API 응답 대기 중</text>

    <text x="148" y="744" text-anchor="end">R5</text>
    <rect x="192" y="735" width="504" height="14" fill="url(#iowait)" stroke="#5eead4"/>
    <text x="704" y="746" font-size="10" fill="#0f766e" font-weight="600">외부 API 응답 대기 중</text>
  </g>

  <!-- Legend for WebFlux -->
  <g transform="translate(120, 780)" font-size="11" fill="#475569">
    <rect x="0" y="0" width="14" height="14" fill="#ef4444"/>
    <text x="20" y="11">request 받음 (Event Loop가 처리)</text>
    <rect x="200" y="0" width="14" height="14" fill="#ef4444" opacity="0.65"/>
    <text x="220" y="11">응답</text>
    <rect x="280" y="0" width="14" height="14" fill="url(#iowait)" stroke="#5eead4"/>
    <text x="300" y="11">I/O 대기 — 스레드 밖, OS가 처리</text>
  </g>

  <text x="500" y="830" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">
    → 5 요청 = 2 스레드면 충분. 100 요청이든 1000 요청이든 같은 모양으로 흘러감.
  </text>

</svg>
